apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong-app-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-app
  template:
    metadata:
      labels:
        app: ping-pong-app
    spec:
      containers:
        - name: ping-pong-app-container
          image: ping-pong-app:1.9
          imagePullPolicy: IfNotPresent
