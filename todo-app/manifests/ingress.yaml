apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-app-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app-svc
                port:
                    number: 4455
          - path: /images
            pathType: Prefix
            backend:
              service:
                name: todo-app-backend-svc
                port:
                    number: 4456
