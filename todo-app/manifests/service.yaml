apiVersion: v1
kind: Service
metadata:
  name: todo-app-svc
spec:
  type: ClusterIP
  selector:
    app: todo-app
  ports:
    - port: 4455
      protocol: TCP
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: todo-app-backend-svc
spec:
  type: ClusterIP
  selector:
    app: todo-app
  ports:
    - port: 4456
      protocol: TCP
      targetPort: 3000
